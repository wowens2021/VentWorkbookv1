<?xml version="1.0" encoding="UTF-8"?>
<!--
  v3.2 §3.3 M11 — Clip 2: Double triggering (breath stacking).
  Two normal breaths, then a stacked pair: breath A starts to exhale,
  patient triggers again mid-expiration, breath B rides on top — peak
  climbs higher because the lung never fully emptied. Expiratory flow
  is interrupted between A and B (never returns to zero).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360"
     role="img" aria-label="Ventilator waveform with double-triggered stacked breaths"
     font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif">
  <rect width="800" height="360" fill="#f5f0e6"/>

  <g stroke="#d6d3d1" stroke-width="1" stroke-dasharray="3 3">
    <line x1="60"  y1="20"  x2="60"  y2="320"/>
    <line x1="180" y1="20"  x2="180" y2="320"/>
    <line x1="300" y1="20"  x2="300" y2="320"/>
    <line x1="420" y1="20"  x2="420" y2="320"/>
    <line x1="540" y1="20"  x2="540" y2="320"/>
    <line x1="660" y1="20"  x2="660" y2="320"/>
    <line x1="780" y1="20"  x2="780" y2="320"/>
  </g>
  <line x1="60" y1="160" x2="780" y2="160" stroke="#a8a29e" stroke-width="1"/>
  <line x1="60" y1="55"  x2="780" y2="55"  stroke="#a8a29e" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="60" y1="260" x2="780" y2="260" stroke="#a8a29e" stroke-width="1.5"/>

  <text x="65" y="15" font-size="10" fill="#57534e">Airway Pressure (cmH2O)</text>
  <text x="65" y="195" font-size="10" fill="#57534e">Flow (L/min)</text>
  <g font-size="10" fill="#57534e" text-anchor="end">
    <text x="55" y="163">0</text><text x="55" y="128">10</text>
    <text x="55" y="93">20</text><text x="55" y="58">30</text>
    <text x="55" y="23">40</text>
  </g>
  <g font-size="10" fill="#57534e" text-anchor="end">
    <text x="55" y="203">60</text><text x="55" y="233">30</text>
    <text x="55" y="263">0</text><text x="55" y="293">-30</text>
    <text x="55" y="323">-60</text>
  </g>

  <!-- Pressure trace:
       Normal breath 1: t=0.3-1.3 (rises to 25)
       Normal breath 2: t=2.0-3.0 (rises to 25)
       Stacked pair: breath A t=4.0-4.8 (peaks 25, drops to ~12 by 5.2),
                     breath B starts t=5.2, rides up to 38 by t=5.7. -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="2"
    points="
      60,142.5
      96,142.5
      180,72.5
      216,72.5
      252,142.5
      300,142.5
      360,72.5
      396,72.5
      432,142.5
      540,142.5
      588,72.5
      612,72.5
      636,100
      684,100
      708,27
      732,27
      756,142.5
      780,142.5
    "/>

  <!-- Flow trace: standard for breaths 1+2; between A and B the expiratory
       limb fails to return to zero — note value at x=684 is -10 (=270) -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="2"
    points="
      60,260
      96,260
      100,230
      180,230
      184,260
      188,290
      252,265
      300,260
      304,230
      396,230
      400,260
      404,290
      432,265
      540,260
      544,230
      612,230
      616,260
      620,290
      636,270
      684,270
      688,260
      692,225
      732,225
      736,260
      740,295
      772,260
      780,260
    "/>

  <!-- Annotation: arrow to the second peak -->
  <g stroke="#0284c7" fill="#0284c7" stroke-width="1.5">
    <line x1="720" y1="80" x2="720" y2="35"/>
    <polygon points="720,28 715,40 725,40"/>
  </g>
  <rect x="640" y="85" width="160" height="22" rx="4" fill="#fef3c7" stroke="#b45309"/>
  <text x="720" y="100" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">
    stacked — no expiration
  </text>

  <g font-size="10" fill="#57534e" text-anchor="middle">
    <text x="60"  y="350">0 s</text><text x="180" y="350">1 s</text>
    <text x="300" y="350">2 s</text><text x="420" y="350">3 s</text>
    <text x="540" y="350">4 s</text><text x="660" y="350">5 s</text>
    <text x="780" y="350">6 s</text>
  </g>
  <!-- Novice-pass §11.1: sweep cursor -->
  <line stroke="#0284c7" stroke-width="2" opacity="0.55" y1="20" y2="320" x1="60" x2="60">
    <animate attributeName="x1" from="60" to="780" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" from="60" to="780" dur="6s" repeatCount="indefinite"/>
  </line>
</svg>
