<?xml version="1.0" encoding="UTF-8"?>
<!--
  v3.2 §3.3 M11 — Reference clip: Premature cycling (PSV).
  PSV breath terminates before the patient has finished inhaling — the
  pressure drops back to PEEP while the patient's inspiratory flow is
  still positive. A sharp expiratory spike or visible flow tail past
  the cycle point is the diagnostic. Not in the recognition pool.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360"
     role="img" aria-label="Ventilator waveform with premature PSV cycling"
     font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif">
  <rect width="800" height="360" fill="#f5f0e6"/>

  <g stroke="#d6d3d1" stroke-width="1" stroke-dasharray="3 3">
    <line x1="60"  y1="20"  x2="60"  y2="320"/>
    <line x1="180" y1="20"  x2="180" y2="320"/>
    <line x1="300" y1="20"  x2="300" y2="320"/>
    <line x1="420" y1="20"  x2="420" y2="320"/>
    <line x1="540" y1="20"  x2="540" y2="320"/>
    <line x1="660" y1="20"  x2="660" y2="320"/>
    <line x1="780" y1="20"  x2="780" y2="320"/>
  </g>
  <line x1="60" y1="160" x2="780" y2="160" stroke="#a8a29e" stroke-width="1"/>
  <line x1="60" y1="55"  x2="780" y2="55"  stroke="#a8a29e" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="60" y1="260" x2="780" y2="260" stroke="#a8a29e" stroke-width="1.5"/>

  <text x="65" y="15" font-size="10" fill="#57534e">Airway Pressure (cmH2O)</text>
  <text x="65" y="195" font-size="10" fill="#57534e">Flow (L/min)</text>
  <g font-size="10" fill="#57534e" text-anchor="end">
    <text x="55" y="163">0</text><text x="55" y="128">10</text>
    <text x="55" y="93">20</text><text x="55" y="58">30</text>
    <text x="55" y="23">40</text>
  </g>
  <g font-size="10" fill="#57534e" text-anchor="end">
    <text x="55" y="203">60</text><text x="55" y="233">30</text>
    <text x="55" y="263">0</text><text x="55" y="293">-30</text>
    <text x="55" y="323">-60</text>
  </g>

  <!-- Pressure: PSV step up to ~20 cmH2O each breath, then drops. On
       breaths 2 and 3 the vent cycles back to PEEP while inspiratory
       flow is still positive (premature) — pressure drops sharply
       though the patient is still pulling. -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="2"
    points="
      60,142.5
      96,142.5
      108,90
      192,90
      216,142.5
      300,142.5
      324,142.5
      336,90
      396,90
      408,142.5
      432,142.5
      540,142.5
      564,142.5
      576,90
      636,90
      648,142.5
      672,142.5
      780,142.5
    "/>

  <!-- Flow: each PSV breath has a decelerating positive inspiratory
       curve. On breaths 2 and 3 the cycle terminates while flow is
       still well above zero — a sharp drop in pressure even as flow
       lingers positive past the cycle point. -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="2"
    points="
      60,260
      96,260
      108,210
      144,225
      192,250
      204,290
      264,265
      300,260
      324,260
      336,210
      372,225
      396,240
      408,250
      432,290
      492,265
      540,260
      564,260
      576,210
      612,225
      636,240
      648,250
      672,290
      732,265
      780,260
    "/>

  <g stroke="#0284c7" fill="#0284c7" stroke-width="1.5">
    <line x1="402" y1="115" x2="402" y2="143"/>
    <polygon points="402,150 397,138 407,138"/>
  </g>
  <rect x="328" y="98" width="160" height="22" rx="4" fill="#fef3c7" stroke="#b45309"/>
  <text x="408" y="113" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">
    cycled off too early
  </text>

  <g font-size="10" fill="#57534e" text-anchor="middle">
    <text x="60"  y="350">0 s</text><text x="180" y="350">1 s</text>
    <text x="300" y="350">2 s</text><text x="420" y="350">3 s</text>
    <text x="540" y="350">4 s</text><text x="660" y="350">5 s</text>
    <text x="780" y="350">6 s</text>
  </g>
</svg>
