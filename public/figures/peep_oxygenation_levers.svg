<?xml version="1.0" encoding="UTF-8"?>
<!--
  M13_M14_merged — "Three levers on the pressure waveform."
  Four panels: baseline · PEEP raised · I-time lengthened · FiO2 changed.
  Each panel shows a pressure-time waveform with the Pmean line dashed
  and the baseline pressure (PEEP floor) annotated.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280"
     role="img" aria-label="Four pressure-time waveforms showing PEEP, inspiratory time, and FiO2 levers"
     font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif">
  <!-- Background -->
  <rect width="1000" height="280" fill="#fbfaf6"/>

  <!-- Panel divider lines -->
  <g stroke="#e7e5e0" stroke-width="1">
    <line x1="250" y1="20" x2="250" y2="260"/>
    <line x1="500" y1="20" x2="500" y2="260"/>
    <line x1="750" y1="20" x2="750" y2="260"/>
  </g>

  <!-- Common settings: each panel = 250px wide, baseline y=210, peak y=80 -->
  <!-- y axis: pressure 0..30 cmH2O, lower y = higher pressure -->
  <!-- panel layout: 0..250, 250..500, 500..750, 750..1000 -->

  <!-- ============================================ -->
  <!-- Panel 1 — Baseline: PEEP 5, Ti 1.0 -->
  <!-- ============================================ -->
  <g>
    <text x="125" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Baseline</text>
    <text x="125" y="52" text-anchor="middle" font-size="11" fill="#6b7280">PEEP 5 · Ti 1.0 s</text>
    <!-- Axis -->
    <line x1="35" y1="40" x2="35" y2="240" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="35" y1="240" x2="240" y2="240" stroke="#9ca3af" stroke-width="1.5"/>
    <!-- PEEP floor reference line (dashed) -->
    <line x1="35" y1="195" x2="240" y2="195" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="38" y="190" font-size="9" fill="#6b7280">PEEP 5</text>
    <!-- Mean airway pressure dashed line -->
    <line x1="35" y1="160" x2="240" y2="160" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="200" y="156" font-size="10" font-weight="700" fill="#7c3aed">Pmean 12</text>
    <!-- Waveform: rise from baseline 195 to plateau 100, hold for Ti, drop back -->
    <path d="M 35 195 L 65 100 L 105 100 L 110 195 L 145 195 L 175 100 L 215 100 L 220 195 L 240 195"
          fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- ============================================ -->
  <!-- Panel 2 — PEEP raised: PEEP 12, Ti 1.0 -->
  <!-- ============================================ -->
  <g>
    <text x="375" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">PEEP raised</text>
    <text x="375" y="52" text-anchor="middle" font-size="11" fill="#6b7280">PEEP 12 · Ti 1.0 s</text>
    <!-- Axis -->
    <line x1="285" y1="40" x2="285" y2="240" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="285" y1="240" x2="490" y2="240" stroke="#9ca3af" stroke-width="1.5"/>
    <!-- PEEP floor lifted -->
    <line x1="285" y1="165" x2="490" y2="165" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="288" y="160" font-size="9" fill="#6b7280">PEEP 12</text>
    <!-- Original PEEP floor (faint) for contrast -->
    <line x1="285" y1="195" x2="490" y2="195" stroke="#d1d5db" stroke-width="1" stroke-dasharray="2 4"/>
    <!-- Pmean -->
    <line x1="285" y1="120" x2="490" y2="120" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="450" y="116" font-size="10" font-weight="700" fill="#7c3aed">Pmean 18</text>
    <!-- Waveform: same shape lifted up by 30px (the PEEP delta) -->
    <path d="M 285 165 L 315 70 L 355 70 L 360 165 L 395 165 L 425 70 L 465 70 L 470 165 L 490 165"
          fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Annotation -->
    <text x="375" y="225" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">↑ entire floor lifted</text>
  </g>

  <!-- ============================================ -->
  <!-- Panel 3 — Ti lengthened: PEEP 5, Ti 1.5 -->
  <!-- ============================================ -->
  <g>
    <text x="625" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">I-time longer</text>
    <text x="625" y="52" text-anchor="middle" font-size="11" fill="#6b7280">PEEP 5 · Ti 1.5 s</text>
    <line x1="535" y1="40" x2="535" y2="240" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="535" y1="240" x2="740" y2="240" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="535" y1="195" x2="740" y2="195" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="538" y="190" font-size="9" fill="#6b7280">PEEP 5</text>
    <!-- Pmean (between baseline and PEEP-raised because plateau is widened) -->
    <line x1="535" y1="143" x2="740" y2="143" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="700" y="139" font-size="10" font-weight="700" fill="#7c3aed">Pmean 16</text>
    <!-- Waveform: same peak/PEEP but plateau is WIDER -->
    <path d="M 535 195 L 565 100 L 635 100 L 640 195 L 670 195 L 700 100 L 740 100"
          fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Plateau highlight arrow -->
    <text x="625" y="225" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">← plateau widened →</text>
  </g>

  <!-- ============================================ -->
  <!-- Panel 4 — FiO2 changed (waveform identical to baseline) -->
  <!-- ============================================ -->
  <g>
    <text x="875" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">FiO2 changed</text>
    <text x="875" y="52" text-anchor="middle" font-size="11" fill="#6b7280">any PEEP / Ti</text>
    <line x1="785" y1="40" x2="785" y2="240" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="785" y1="240" x2="990" y2="240" stroke="#9ca3af" stroke-width="1.5"/>
    <line x1="785" y1="195" x2="990" y2="195" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="788" y="190" font-size="9" fill="#6b7280">PEEP 5</text>
    <line x1="785" y1="160" x2="990" y2="160" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="945" y="156" font-size="10" font-weight="700" fill="#7c3aed">Pmean 12</text>
    <!-- Waveform: identical to baseline -->
    <path d="M 785 195 L 815 100 L 855 100 L 860 195 L 895 195 L 925 100 L 965 100 L 970 195 L 990 195"
          fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="875" y="225" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">waveform unchanged</text>
  </g>

  <!-- Legend at the bottom -->
  <g transform="translate(20, 260)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#1d4ed8" stroke-width="2.5"/>
    <text x="28" y="4" font-size="10" fill="#374151">Airway pressure</text>
    <line x1="140" y1="0" x2="162" y2="0" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="168" y="4" font-size="10" fill="#374151">Mean airway pressure</text>
    <line x1="340" y1="0" x2="362" y2="0" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="368" y="4" font-size="10" fill="#374151">PEEP floor</text>
  </g>
</svg>
